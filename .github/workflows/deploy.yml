name: Deploy to AWS Elastic Beanstalk

on:
  push:
    branches:
      - dev

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::838775536396:role/github-actions-eb-deploy
          aws-region: ap-southeast-2

      - name: Deploy to Elastic Beanstalk
        uses: aws-actions/aws-elastic-beanstalk-deploy@v1
        with:
          application_name: app-kenbar-api
          environment_name: App-kenbar-api-env
          existing_bucket_name: elasticbeanstalk-ap-southeast-2-838775536396
          region: ap-southeast-2
          version_label: github-${{ github.run_number }}
          deployment_package: .
